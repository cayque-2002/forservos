<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForServOS - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-soft: #e2e8f0;
        }

        body {
            height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 30%),
                linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid var(--border-soft);
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--primary);
        }

        .form-control {
            height: 48px;
            border-radius: 10px;
            border: 1px solid var(--border-soft);
        }

        .form-control:focus {
            border-color: rgba(37, 99, 235, 0.5);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            height: 48px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            font-weight: 600;
        }

        .btn-login:hover {
            background: var(--accent-hover);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="brand">
        ForServOS
    </div>

    <h2 class="login-title text-center">Entrar</h2>
    <p class="login-subtitle text-center">
        Acesse o sistema
    </p>

    <div id="alert" class="alert d-none"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control" required>
        </div>

        <button id="btnEntrar" class="btn btn-primary w-100 btn-login">
            Entrar
        </button>
    </form>

</div>

<script>
const API_URL = "http://localhost:8000";

$("#loginForm").on("submit", function(e) {
    e.preventDefault();

    const email = $("#email").val();
    const senha = $("#senha").val();
    const $btn = $("#btnEntrar");

    $btn.prop("disabled", true).text("Entrando...");

    $.ajax({
        url: API_URL + "/auth/login",
        method: "POST",
        contentType: "application/json",
        data: JSON.stringify({ email, senha }),

        success: function(response) {
            if (!response.success) {
                showError(response.error.message);
                return;
            }

            localStorage.setItem("token", response.data.token);

            showSuccess("Login realizado com sucesso 🚀");

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);
        },

        error: function(xhr) {
            const response = xhr.responseJSON;

            if (response && response.error) {
                showError(response.error.message);
            } else {
                showError("Erro inesperado");
            }
        },

        complete: function() {
            $btn.prop("disabled", false).text("Entrar");
        }
    });
});

function showError(message) {
    $("#alert")
        .removeClass("d-none alert-success")
        .addClass("alert-danger")
        .text(message);
}

function showSuccess(message) {
    $("#alert")
        .removeClass("d-none alert-danger")
        .addClass("alert-success")
        .text(message);
}
</script>

</body>
</html>
